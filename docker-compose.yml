version: "3.9"
services: {postgres: {image: "postgres:16-alpine", container_name: "clara-platform-postgres", restart: "unless-stopped", environment: {POSTGRES_USER: "${POSTGRES_USER:-clara}", POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-clara}", POSTGRES_DB: "${POSTGRES_DB:-clara_platform}"}, ports: ["5432:5432"], volumes: ["postgres_data:/var/lib/postgresql/data"]}}
volumes: {postgres_data: null}
